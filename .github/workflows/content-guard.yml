name: Content Guard (Ghost Data Cleanup)

on:
  push:
    branches: [main]
    paths:
      - 'src/content/pages/**'
  workflow_dispatch:

jobs:
  cleanup:
    name: Scrub Ghost Data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Need full history to avoid detached HEAD
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Cleanup Script
        run: node scripts/clean-content.mjs

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Clean Content
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name "adamgroenhout"
          git config --global user.email "adamgroenhout@users.noreply.github.com"
          git add src/content/pages/
          git commit -m "chore: automated cleanup of CMS ghost data [skip ci]"
          git push
