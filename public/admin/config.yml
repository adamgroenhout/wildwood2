# Local backend for development (set to true for local development with npx decap-server)
local_backend: true

# Backend for GitHub
backend:
  name: github
  repo: adamgroenhout/wildwood
  branch: main
  base_url: https://wildwood-gateway.vercel.app
  auth_endpoint: api/auth

media_folder: "public/images"
public_folder: "/wildwood/images"

collections:
  - name: "settings"
    label: "Global Settings"
    extension: "json"
    format: "json"
    files:
      - name: "settings"
        label: "Site Settings"
        file: "src/content/settings.json"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string" }
          - { label: "Default SEO Title", name: "site_title", widget: "string" }
          - { label: "Default Meta Description", name: "site_description", widget: "markdown" }
          - { label: "Tagline", name: "tagline", widget: "text" }
          - { label: "Copyright Text", name: "copyright_text", widget: "string" }
          - { label: "Coming Soon Text", name: "coming_soon_text", widget: "string" }
          - { label: "Staff Login Text", name: "staff_login_text", widget: "string" }
          - { label: "Staff Logout Text", name: "staff_logout_text", widget: "string" }
          - { label: "Logo", name: "logo", widget: "image" }
          - { label: "Header CTA Text", name: "header_cta_text", widget: "string" }
          - { label: "Header CTA Link", name: "header_cta_href", widget: "string" }
          - { label: "Land Acknowledgment", name: "land_acknowledgment", widget: "markdown" }
          - label: "Contact Information"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Phone", name: "phone", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Consultation URL", name: "consultation_url", widget: "string" }
          - label: "Navigation"
            name: "navigation"
            widget: "list"
            summary: "{{name}}"
            fields:
              - { label: "Link Name", name: "name", widget: "string" }
              - { label: "Link URL", name: "href", widget: "string" }
              - label: "Sub-menu Items"
                name: "subItems"
                widget: "list"
                required: false
                summary: "{{name}}"
                fields:
                  - { label: "Link Name", name: "name", widget: "string" }
                  - { label: "Link URL", name: "href", widget: "string" }
          - label: "Footer Columns"
            name: "footer_columns"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "Column Title", name: "title", widget: "string" }
              - label: "Links"
                name: "links"
                widget: "list"
                summary: "{{name}}"
                fields:
                  - { label: "Link Name", name: "name", widget: "string" }
                  - { label: "Link URL", name: "href", widget: "string" }

  - name: "site_pages"
    label: "Site Pages (Block Builder)"
    folder: "src/content/pages"
    extension: "json"
    format: "json"
    create: true
    identifier_field: "title"
    slug: "{{slug}}"
    fields:
      - { label: "Page Title", name: "title", widget: "text" }
      - { label: "Page Subtitle", name: "subtitle", widget: "text", required: false }
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - label: "Blocks"
        name: "blocks"
        widget: "list"
        types:
          - name: "hero"
            label: "Hero Section"
            widget: "object"
            fields:
              - { label: "Title", name: "hero_title", widget: "text" }
              - { label: "Subtitle", name: "hero_subtitle", widget: "string", required: false }
              - { label: "Background Image", name: "hero_image", widget: "image", required: false }
              - { label: "Image Alt Text", name: "hero_alt", widget: "string", required: false }
              - { label: "CTA Button Text", name: "cta_text", widget: "string", required: false }
              - { label: "CTA Button URL", name: "cta_url", widget: "string", required: false }
              - { label: "Theme", name: "theme", widget: "select", options: ["dark", "light", "terracotta", "olive"], default: "dark" }
              - { label: "Alignment", name: "alignment", widget: "select", options: ["center", "left"], default: "center" }
              - label: "Specialties/Tags"
                name: "specialties"
                widget: "list"
                required: false
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }

          - name: "text"
            label: "Text Content"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "text", required: false }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Body", name: "body", widget: "markdown" }
              - { label: "Theme", name: "theme", widget: "select", options: ["sage", "cream", "sand", "paper", "charcoal", "olive", "alternate"], default: "alternate" }
              - { label: "Alignment", name: "alignment", widget: "select", options: ["left", "center"], default: "left" }
              - { label: "Padding", name: "padding", widget: "select", options: ["standard", "large", "small", "none"], default: "standard" }

          - name: "image_text"
            label: "Image & Text Split"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "text", required: false }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Body", name: "body", widget: "markdown" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "image_alt", widget: "string", required: false }
              - { label: "Image Position", name: "image_position", widget: "select", options: ["left", "right"], default: "left" }
              - { label: "Link Text", name: "link_text", widget: "string", required: false }
              - { label: "Link URL", name: "link_url", widget: "string", required: false }
              - { label: "Theme", name: "theme", widget: "select", options: ["sage", "cream", "sand", "paper", "charcoal", "olive", "alternate"], default: "alternate" }
              - { label: "Padding", name: "padding", widget: "select", options: ["standard", "large", "small", "none"], default: "small" }

          - name: "accordion"
            label: "Accordion / FAQs"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "text", required: false }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Intro Body", name: "body", widget: "markdown", required: false }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Content", name: "content", widget: "markdown" }
              - { label: "Theme", name: "theme", widget: "select", options: ["sage", "cream", "sand", "paper", "charcoal", "olive", "alternate"], default: "charcoal" }
              - { label: "Layout", name: "layout", widget: "select", options: ["split", "stacked"], default: "stacked" }
              - { label: "Padding", name: "padding", widget: "select", options: ["standard", "large", "small", "none"], default: "standard" }

          - name: "grid"
            label: "Grid List / Cards"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "text", required: false }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string", required: false }
                  - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
                  - { label: "Text", name: "text", widget: "markdown", required: false }
                  - { label: "Number", name: "number", widget: "string", required: false }
                  - { label: "Link URL", name: "link_url", widget: "string", required: false }
                  - { label: "Link Text", name: "link_text", widget: "string", required: false, default: "Learn more" }
              - { label: "Columns", name: "columns", widget: "select", options: ["2", "3", "4"], default: "3" }
              - { label: "Style", name: "style", widget: "select", options: ["cards", "minimal", "numbered"], default: "minimal" }
              - { label: "Theme", name: "theme", widget: "select", options: ["sage", "cream", "sand", "paper", "charcoal", "olive", "alternate"], default: "alternate" }
              - { label: "Padding", name: "padding", widget: "select", options: ["standard", "large", "small", "none"], default: "standard" }

          - name: "cta"
            label: "Call To Action"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "text" }
              - { label: "Tagline", name: "tagline", widget: "string", required: false }
              - { label: "Button Text", name: "button_text", widget: "string" }
              - { label: "Button URL", name: "button_url", widget: "string" }
              - { label: "Background Image", name: "image", widget: "image", required: false }
              - { label: "Image Alt Text", name: "image_alt", widget: "string", required: false }
              - { label: "Theme", name: "theme", widget: "select", options: ["sage", "cream", "sand", "paper", "charcoal", "olive", "terracotta", "alternate"], default: "olive" }
              - { label: "Layout", name: "layout", widget: "select", options: ["centered", "split"], default: "centered" }
